name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ev-smart-charging-card.js
          generate_release_notes: true
